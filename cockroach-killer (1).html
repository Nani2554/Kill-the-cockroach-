<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIT Cockroach Killer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Oswald:wght@400;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#1a1208;
    background-image:
      repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(0,0,0,.3) 39px,rgba(0,0,0,.3) 40px),
      repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(0,0,0,.3) 39px,rgba(0,0,0,.3) 40px);
    background-size:40px 40px;
    overflow:hidden; height:100vh; width:100vw;
    font-family:'Oswald',sans-serif;
    user-select:none;
  }
  #game-area { position:relative; width:100vw; height:100vh; overflow:hidden; }
  #hud {
    position:fixed; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:center;
    padding:14px 28px;
    background:rgba(0,0,0,.75);
    border-bottom:2px solid #c00;
    z-index:100; pointer-events:none;
  }
  #title {
    font-family:'Creepster',cursive;
    font-size:2rem; color:#fff;
    letter-spacing:2px;
    display:flex; align-items:center; gap:10px;
  }
  #title .hit-badge {
    background:#e00; color:#fff;
    font-family:'Oswald',sans-serif;
    font-weight:700; font-size:1.4rem;
    padding:2px 10px; border-radius:4px;
    letter-spacing:3px;
  }
  #score-wrap { display:flex; gap:32px; align-items:center; }
  .stat { display:flex; flex-direction:column; align-items:center; }
  .stat-label { font-size:11px; color:#aaa; letter-spacing:1px; text-transform:uppercase; }
  .stat-value { font-size:1.6rem; font-weight:700; color:#ff4444; line-height:1; }
  #spray-btn {
    position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
    z-index:200;
    background:linear-gradient(135deg,#e00 0%,#900 100%);
    color:#fff; font-family:'Oswald',sans-serif;
    font-size:1.1rem; font-weight:700; letter-spacing:2px; text-transform:uppercase;
    border:none; padding:14px 36px; border-radius:50px; cursor:pointer;
    box-shadow:0 4px 24px #e0000088, 0 2px 0 #600;
    transition:transform .1s, box-shadow .1s, background .2s;
    outline:none;
  }
  #spray-btn:hover { background:linear-gradient(135deg,#ff2222 0%,#aa0000 100%); }
  #spray-btn.active {
    background:linear-gradient(135deg,#ff8800 0%,#cc4400 100%);
    box-shadow:0 4px 24px #ff880088;
    animation:btnPulse .4s infinite alternate;
  }
  @keyframes btnPulse { from{transform:translateX(-50%) scale(1);}to{transform:translateX(-50%) scale(1.04);} }
  #spray-btn:disabled { background:#555; box-shadow:none; animation:none; }

  .face-roach {
    position:absolute; pointer-events:all; z-index:10;
    cursor:crosshair;
  }
  .face-roach .face-wrap {
    position:relative; width:70px; height:70px;
    border-radius:50%; overflow:hidden;
    border:3px solid #8B4513;
    box-shadow:0 0 8px rgba(0,0,0,.7);
  }
  .face-roach .face-wrap img {
    width:100%; height:100%; object-fit:cover; object-position:center top;
    pointer-events:none;
  }
  .face-roach .legs { position:absolute; inset:0; pointer-events:none; }
  .face-roach.dying {
    animation:faceDie .5s ease-out forwards;
    pointer-events:none;
  }
  @keyframes faceDie {
    0%  { transform:scale(1) rotate(0deg); opacity:1; }
    40% { transform:scale(1.3) rotate(25deg); opacity:.8; }
    100%{ transform:scale(0.1) rotate(200deg); opacity:0; }
  }

  .spray-cloud {
    position:fixed; pointer-events:none; z-index:150;
    border-radius:50%;
    animation:cloudFade .7s ease-out forwards;
  }
  @keyframes cloudFade {
    0%  { opacity:.9; transform:scale(0.2); }
    50% { opacity:.7; transform:scale(1); }
    100%{ opacity:0; transform:scale(1.6); }
  }
  .spray-drop {
    position:fixed; pointer-events:none; z-index:149;
    width:5px; height:5px; border-radius:50%;
    background:#98fb00;
    animation:dropFly .6s ease-out forwards;
  }
  @keyframes dropFly {
    0%  { opacity:1; transform:translate(0,0) scale(1); }
    100%{ opacity:0; transform:translate(var(--tx),var(--ty)) scale(0.2); }
  }

  .kill-text {
    position:fixed; pointer-events:none; z-index:300;
    font-family:'Creepster',cursive; font-size:2rem; color:#ff4444;
    text-shadow:0 0 8px #000;
    animation:killFloat 1s ease-out forwards;
  }
  @keyframes killFloat {
    0%  { opacity:1; transform:scale(.6) translateY(0); }
    30% { opacity:1; transform:scale(1.2) translateY(-10px); }
    100%{ opacity:0; transform:scale(.9) translateY(-50px); }
  }

  .hit-mark {
    position:fixed; pointer-events:none; z-index:200;
    width:60px; height:60px; border-radius:50%;
    background:radial-gradient(circle, rgba(200,40,0,.7) 0%, rgba(255,80,0,.3) 60%, transparent 100%);
    animation:hitMark .8s ease-out forwards;
  }
  @keyframes hitMark {
    0%  { opacity:1; transform:scale(.3); }
    100%{ opacity:0; transform:scale(2.5); }
  }

  #spray-cursor {
    position:fixed; pointer-events:none; z-index:999;
    display:none; width:60px; height:110px;
    transform:translate(-20px, -100px);
  }
  body.spraying { cursor:none; }

  #overlay {
    position:fixed; inset:0;
    background:rgba(0,0,0,.88);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:500; gap:16px;
  }
  #overlay h1 {
    font-family:'Creepster',cursive; font-size:3rem; color:#fff;
    letter-spacing:3px;
  }
  #overlay .hit-big {
    background:#e00; color:#fff; font-family:'Oswald',sans-serif;
    font-weight:700; font-size:4rem; padding:4px 24px; border-radius:6px;
    letter-spacing:6px; box-shadow:0 4px 20px #e00a;
  }
  #overlay p { font-size:1rem; color:#bbb; text-align:center; max-width:340px; line-height:1.6; }
  #start-btn {
    background:linear-gradient(135deg,#e00 0%,#900 100%);
    color:#fff; font-family:'Oswald',sans-serif;
    font-size:1.2rem; font-weight:700; letter-spacing:2px; text-transform:uppercase;
    border:none; padding:14px 44px; border-radius:50px; cursor:pointer;
    box-shadow:0 4px 20px #e0000066; margin-top:10px;
    transition:transform .1s, background .2s;
  }
  #start-btn:hover { background:linear-gradient(135deg,#ff2222 0%,#aa0000 100%); transform:scale(1.04); }

  #wave-banner {
    position:fixed; top:70px; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,.8); border:2px solid #e00;
    padding:8px 28px; border-radius:30px;
    font-family:'Creepster',cursive; font-size:1.5rem; color:#ff4444;
    letter-spacing:3px; z-index:300; opacity:0; transition:opacity .4s;
    pointer-events:none;
  }
  #wave-banner.show { opacity:1; }

  #ammo-bar {
    position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
    display:flex; gap:5px; z-index:200; pointer-events:none;
  }
  .ammo-dot {
    width:12px; height:12px; border-radius:50%;
    background:#e00; transition:background .2s;
    box-shadow:0 0 4px #e00a;
  }
  .ammo-dot.empty { background:#333; box-shadow:none; }

  #reload-bar {
    position:fixed; bottom:98px; left:50%; transform:translateX(-50%);
    width:200px; height:6px; border-radius:3px;
    background:#333; z-index:200; pointer-events:none; display:none;
    overflow:hidden;
  }
  #reload-fill {
    height:100%; width:0%; background:#e00;
    border-radius:3px; transition:none;
  }
</style>
</head>
<body>

<div id="overlay">
  <h1>☠️ COCKROACH RAID</h1>
  <div class="hit-big">HIT</div>
  <p>These bugs have your face on them — spray them dead with the legendary HIT!</p>
  <button id="start-btn">🪣 Start Extermination</button>
</div>

<div id="hud">
  <div id="title">
    <span class="hit-badge">HIT</span>
    COCKROACH RAID
  </div>
  <div id="score-wrap">
    <div class="stat"><span class="stat-label">Killed</span><span class="stat-value" id="kill-count">0</span></div>
    <div class="stat"><span class="stat-label">Wave</span><span class="stat-value" id="wave-num">1</span></div>
    <div class="stat"><span class="stat-label">Alive</span><span class="stat-value" id="alive-count">0</span></div>
  </div>
</div>

<div id="wave-banner">WAVE 1</div>
<div id="ammo-bar"></div>
<div id="reload-bar"><div id="reload-fill"></div></div>
<div id="game-area"></div>

<button id="spray-btn">💨 HIT Cockroach Killer Spray</button>

<!-- HIT Spray Can SVG cursor -->
<svg id="spray-cursor" viewBox="0 0 60 110" xmlns="http://www.w3.org/2000/svg">
  <!-- Can body -->
  <rect x="12" y="30" width="36" height="72" rx="8" fill="#cc0000"/>
  <rect x="12" y="30" width="36" height="72" rx="8" fill="url(#canShine)" opacity=".3"/>
  <defs>
    <linearGradient id="canShine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fff" stop-opacity=".4"/>
      <stop offset="40%" stop-color="#fff" stop-opacity=".0"/>
      <stop offset="100%" stop-color="#000" stop-opacity=".2"/>
    </linearGradient>
  </defs>
  <!-- White band -->
  <rect x="12" y="52" width="36" height="28" rx="2" fill="#fff"/>
  <!-- HIT text -->
  <text x="30" y="70" text-anchor="middle" font-family="Arial Black" font-weight="900" font-size="14" fill="#cc0000" letter-spacing="2">HIT</text>
  <text x="30" y="78" text-anchor="middle" font-family="Arial" font-size="5.5" fill="#333">COCKROACH KILLER</text>
  <!-- Cap -->
  <rect x="16" y="18" width="28" height="14" rx="4" fill="#aaa"/>
  <rect x="20" y="14" width="20" height="6" rx="3" fill="#888"/>
  <!-- Nozzle -->
  <rect x="8" y="20" width="12" height="5" rx="2.5" fill="#666"/>
  <rect x="2" y="21" width="8" height="3" rx="1.5" fill="#555"/>
  <!-- Bottom ridge -->
  <rect x="12" y="97" width="36" height="5" rx="4" fill="#990000"/>
  <!-- Spray dots decoration -->
  <circle cx="24" cy="44" r="2" fill="#cc0000" opacity=".4"/>
  <circle cx="30" cy="42" r="2" fill="#cc0000" opacity=".4"/>
  <circle cx="36" cy="44" r="2" fill="#cc0000" opacity=".4"/>
</svg>

const gameArea = document.getElementById('game-area');
const killCountEl = document.getElementById('kill-count');
const waveNumEl = document.getElementById('wave-num');
const aliveCountEl = document.getElementById('alive-count');
const sprayBtn = document.getElementById('spray-btn');
const sprayCursor = document.getElementById('spray-cursor');
const waveBanner = document.getElementById('wave-banner');
const ammoBar = document.getElementById('ammo-bar');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('start-btn');
const reloadBar = document.getElementById('reload-bar');
const reloadFill = document.getElementById('reload-fill');

let roaches = [], killCount = 0, wave = 1;
let sprayActive = false, maxAmmo = 10, ammo = maxAmmo, reloading = false;
let gameStarted = false, mouseX = 0, mouseY = 0, sprayInterval = null;

function updateAmmoUI() {
  ammoBar.innerHTML = '';
  for (let i = 0; i < maxAmmo; i++) {
    const d = document.createElement('div');
    d.className = 'ammo-dot' + (i >= ammo ? ' empty' : '');
    ammoBar.appendChild(d);
  }
}

class Roach {
  constructor() {
    this.el = document.createElement('div');
    this.el.className = 'face-roach';
    this.el.innerHTML = `
      <svg class="legs" viewBox="0 0 70 70" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:70px;height:70px;z-index:-1">
        <line x1="10" y1="20" x2="-4" y2="10" stroke="#3d2200" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="8"  y1="35" x2="-6" y2="33" stroke="#3d2200" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="10" y1="50" x2="-4" y2="60" stroke="#3d2200" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="60" y1="20" x2="74" y2="10" stroke="#3d2200" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="62" y1="35" x2="76" y2="33" stroke="#3d2200" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="60" y1="50" x2="74" y2="60" stroke="#3d2200" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="35" y1="5" x2="28" y2="-6" stroke="#5a3300" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="35" y1="5" x2="42" y2="-6" stroke="#5a3300" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <div class="face-wrap"><img src="${PHOTO_SRC}" alt="bug"/></div>
    `;
    this.x = Math.random() * (window.innerWidth - 90) + 20;
    this.y = Math.random() * (window.innerHeight - 130) + 70;
    this.vx = (Math.random() - .5) * 2.2;
    this.vy = (Math.random() - .5) * 2.2;
    this.alive = true; this.scared = false;
    this.scaredTimer = 0; this.wobble = 0;
    this.el.style.cssText = `left:${this.x}px;top:${this.y}px;transform:rotate(0deg)`;
    gameArea.appendChild(this.el);
  }
  update(dt) {
    if (!this.alive) return;
    this.wobble += .15;
    if (this.scared) {
      this.scaredTimer -= dt;
      if (this.scaredTimer <= 0) this.scared = false;
      this.vx += (Math.random() - .5) * 1.4;
      this.vy += (Math.random() - .5) * 1.4;
    } else {
      this.vx += (Math.random() - .5) * .35;
      this.vy += (Math.random() - .5) * .35;
    }
    const spd = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
    const ms = this.scared ? 5 : 2.2;
    if (spd > ms) { this.vx = this.vx/spd*ms; this.vy = this.vy/spd*ms; }
    if (spd < .4) { this.vx += (Math.random()-.5)*.9; this.vy += (Math.random()-.5)*.9; }
    this.x += this.vx; this.y += this.vy;
    const m = 50, ht = 65;
    if (this.x < m) { this.vx = Math.abs(this.vx)+.5; this.x = m; }
    if (this.x > window.innerWidth - m) { this.vx = -Math.abs(this.vx)-.5; this.x = window.innerWidth-m; }
    if (this.y < ht+m) { this.vy = Math.abs(this.vy)+.5; this.y = ht+m; }
    if (this.y > window.innerHeight-m) { this.vy = -Math.abs(this.vy)-.5; this.y = window.innerHeight-m; }
    const angle = Math.atan2(this.vy, this.vx) * 180/Math.PI;
    const wiggle = Math.sin(this.wobble*5) * 5;
    this.el.style.left = this.x + 'px';
    this.el.style.top  = this.y + 'px';
    this.el.style.transform = `rotate(${angle + wiggle}deg)`;
  }
  die() {
    if (!this.alive) return;
    this.alive = false;
    this.el.classList.add('dying');
    setTimeout(() => { if (this.el.parentNode) this.el.parentNode.removeChild(this.el); }, 600);
  }
  scaredOf(sx, sy) {
    const dx = this.x+35-sx, dy = this.y+35-sy;
    const dist = Math.sqrt(dx*dx+dy*dy);
    if (dist < 220) {
      this.scared = true; this.scaredTimer = 2500;
      if (dist < 1) return;
      this.vx += (dx/dist)*6; this.vy += (dy/dist)*6;
    }
  }
}

function spawnWave(n) {
  roaches.forEach(r => { if (r.el.parentNode) r.el.parentNode.removeChild(r.el); });
  roaches = [];
  for (let i = 0; i < 5+n*2; i++) roaches.push(new Roach());
  updateAlive(); showBanner('💀 WAVE '+n);
}

function showBanner(t) {
  waveBanner.textContent = t; waveBanner.classList.add('show');
  setTimeout(() => waveBanner.classList.remove('show'), 2000);
}

function updateAlive() {
  const alive = roaches.filter(r => r.alive).length;
  aliveCountEl.textContent = alive;
  if (alive === 0 && gameStarted) {
    setTimeout(() => {
      wave++; waveNumEl.textContent = wave;
      ammo = maxAmmo; updateAmmoUI();
      spawnWave(wave);
    }, 1800);
  }
}

function sprayAt(x, y) {
  if (ammo <= 0 || reloading) return;
  ammo--; updateAmmoUI();
  emitHITSpray(x, y);
  roaches.forEach(r => {
    if (!r.alive) return;
    r.scaredOf(x, y);
    const dx = r.x+35-x, dy = r.y+35-y;
    if (Math.sqrt(dx*dx+dy*dy) < 80) {
      r.die();
      killCount++; killCountEl.textContent = killCount;
      showKillText(x, y);
      showHitMark(x, y);
      setTimeout(updateAlive, 600);
    }
  });
  if (ammo === 0) startReload();
}

function startReload() {
  reloading = true;
  sprayBtn.textContent = '⏳ Reloading HIT...';
  sprayBtn.disabled = true;
  reloadBar.style.display = 'block';
  reloadFill.style.width = '0%';
  const duration = 2500;
  const start = Date.now();
  const tick = () => {
    const prog = Math.min(1, (Date.now()-start)/duration);
    reloadFill.style.width = (prog*100)+'%';
    if (prog < 1) { requestAnimationFrame(tick); }
    else {
      ammo = maxAmmo; reloading = false; updateAmmoUI();
      reloadBar.style.display = 'none';
      sprayBtn.disabled = false;
      sprayBtn.textContent = sprayActive ? '🔴 STOP SPRAYING' : '💨 HIT Cockroach Killer Spray';
    }
  };
  requestAnimationFrame(tick);
}

function emitHITSpray(cx, cy) {
  // Main green cloud
  for (let i = 0; i < 10; i++) {
    const p = document.createElement('div');
    p.className = 'spray-cloud';
    const size = 30 + Math.random()*80;
    const angle = Math.random()*Math.PI*2;
    const dist = Math.random()*70;
    p.style.cssText = `
      left:${cx+Math.cos(angle)*dist - size/2}px;
      top:${cy+Math.sin(angle)*dist - size/2}px;
      width:${size}px; height:${size}px;
      background:radial-gradient(circle,rgba(${Math.random()>0.5?'60,200,0':'120,230,30'},.85) 0%,rgba(30,160,0,.3) 60%,transparent 100%);
      animation-delay:${Math.random()*.15}s;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 900);
  }
  // Flying drops
  for (let i = 0; i < 16; i++) {
    const d = document.createElement('div');
    d.className = 'spray-drop';
    const angle = Math.random()*Math.PI*2;
    const dist = 60 + Math.random()*80;
    d.style.cssText = `
      left:${cx}px; top:${cy}px;
      --tx:${Math.cos(angle)*dist}px; --ty:${Math.sin(angle)*dist}px;
      animation-delay:${Math.random()*.1}s;
    `;
    document.body.appendChild(d);
    setTimeout(() => d.remove(), 800);
  }
}

function showKillText(x, y) {
  const msgs = ['DEAD!','KILLED!','GOT HIM!','SPLAT!','BYE BYE!','☠️'];
  const t = document.createElement('div');
  t.className = 'kill-text';
  t.textContent = msgs[Math.floor(Math.random()*msgs.length)];
  t.style.cssText = `left:${x-40}px;top:${y-30}px;`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 1100);
}

function showHitMark(x, y) {
  const h = document.createElement('div');
  h.className = 'hit-mark';
  h.style.cssText = `left:${x-30}px;top:${y-30}px;`;
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 900);
}

let last = 0;
function gameLoop(ts) {
  const dt = ts-last; last = ts;
  if (gameStarted) roaches.forEach(r => r.update(dt));
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);

sprayBtn.addEventListener('click', () => {
  if (reloading) return;
  sprayActive = !sprayActive;
  if (sprayActive) {
    sprayBtn.textContent = '🔴 STOP SPRAYING';
    sprayBtn.classList.add('active');
    document.body.classList.add('spraying');
    sprayCursor.style.display = 'block';
    sprayInterval = setInterval(() => {
      if (sprayActive && !reloading) sprayAt(mouseX, mouseY);
    }, 220);
  } else {
    stopSpray();
  }
});

function stopSpray() {
  sprayActive = false;
  if (!reloading) sprayBtn.textContent = '💨 HIT Cockroach Killer Spray';
  sprayBtn.classList.remove('active');
  document.body.classList.remove('spraying');
  sprayCursor.style.display = 'none';
  if (sprayInterval) { clearInterval(sprayInterval); sprayInterval = null; }
}

document.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  sprayCursor.style.left = e.clientX+'px';
  sprayCursor.style.top  = e.clientY+'px';
});
document.addEventListener('mousedown', e => {
  if (sprayActive && !reloading && e.target !== sprayBtn)
    sprayAt(e.clientX, e.clientY);
});

startBtn.addEventListener('click', () => {
  overlay.style.display = 'none';
  gameStarted = true; wave = 1; killCount = 0; ammo = maxAmmo;
  waveNumEl.textContent = '1'; killCountEl.textContent = '0';
  updateAmmoUI(); spawnWave(1);
});

updateAmmoUI();
</script>
